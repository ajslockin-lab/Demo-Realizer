kind = "web"
previewPath = "/"
title = "FIFA WC 2026 AI Predictor"
version = "1.0.0"
id = "artifacts/wc2026"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21676

[services.development]
run = "pnpm --filter @workspace/wc2026 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wc2026", "run", "build" ]
publicDir = "artifacts/wc2026/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21676"
BASE_PATH = "/"
