openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: FIFA World Cup 2026 AI Predictor API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: predict
    description: AI match prediction with Poisson ML model
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /lineup:
    post:
      operationId: getLineup
      tags: [predict]
      summary: Predict starting XI and formation for both teams before official announcement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LineupInput"
      responses:
        "200":
          description: Predicted lineups for both teams
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LineupPrediction"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /predict:
    post:
      operationId: predictMatch
      tags: [predict]
      summary: Predict a match outcome using Poisson regression + AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchInput"
      responses:
        "200":
          description: Rich ML + AI prediction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prediction"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Prediction failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: string

    LineupInput:
      type: object
      required: [home, away, group, date]
      properties:
        home:
          type: string
        away:
          type: string
        group:
          type: string
        date:
          type: string

    LineupPlayer:
      type: object
      required: [name, position, number, isStar]
      properties:
        name:
          type: string
        position:
          type: string
        number:
          type: integer
        isStar:
          type: boolean

    TeamLineup:
      type: object
      required: [formation, xi, tactics, keyThreat]
      properties:
        formation:
          type: string
        xi:
          type: array
          items:
            $ref: "#/components/schemas/LineupPlayer"
        tactics:
          type: string
        keyThreat:
          type: string
        injuryAlert:
          type: string
          nullable: true

    LineupPrediction:
      type: object
      required: [home, away]
      properties:
        home:
          $ref: "#/components/schemas/TeamLineup"
        away:
          $ref: "#/components/schemas/TeamLineup"

    MatchInput:
      type: object
      required: [id, home, away, group, venue, date, time]
      properties:
        id:
          type: string
        home:
          type: string
        away:
          type: string
        group:
          type: string
        venue:
          type: string
        date:
          type: string
        time:
          type: string

    ScorelineProbability:
      type: object
      required: [home, away, probability]
      properties:
        home:
          type: integer
        away:
          type: integer
        probability:
          type: number

    ScorerEntry:
      type: object
      required: [name, probability, goals]
      properties:
        name:
          type: string
        probability:
          type: number
        goals:
          type: integer

    GoalscorerPrediction:
      type: object
      required: [home, away]
      properties:
        home:
          type: array
          items:
            $ref: "#/components/schemas/ScorerEntry"
        away:
          type: array
          items:
            $ref: "#/components/schemas/ScorerEntry"

    ModelFeatures:
      type: object
      required: [homeAttackStrength, homeDefenseStrength, awayAttackStrength, awayDefenseStrength, homeFormFactor, awayFormFactor, rankFactor, homeXG, awayXG]
      properties:
        homeAttackStrength:
          type: number
        homeDefenseStrength:
          type: number
        awayAttackStrength:
          type: number
        awayDefenseStrength:
          type: number
        homeFormFactor:
          type: number
        awayFormFactor:
          type: number
        rankFactor:
          type: number
        homeXG:
          type: number
        awayXG:
          type: number

    Prediction:
      type: object
      required:
        - homeWinPct
        - drawPct
        - awayWinPct
        - predictedScore
        - homeXG
        - awayXG
        - scorelines
        - goalscorers
        - keyFactors
        - confidence
        - analysis
        - modelFeatures
      properties:
        homeWinPct:
          type: integer
        drawPct:
          type: integer
        awayWinPct:
          type: integer
        predictedScore:
          type: string
        homeXG:
          type: number
        awayXG:
          type: number
        scorelines:
          type: array
          items:
            $ref: "#/components/schemas/ScorelineProbability"
        goalscorers:
          $ref: "#/components/schemas/GoalscorerPrediction"
        keyFactors:
          type: array
          items:
            type: string
        confidence:
          type: string
          enum: ["High", "Medium", "Low"]
        analysis:
          type: string
        modelFeatures:
          $ref: "#/components/schemas/ModelFeatures"
